spring:
  datasource:
    url: jdbc:tc:mysql:8.0.36:///sky_take_out?TC_INITSCRIPT=file:src/main/resources/sql/sky.sql
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  redis:
    host: localhost
    port: 6379
  main:
    allow-bean-definition-overriding: true

sky:
  jwt:
    admin-secret-key: test-admin-secret-key-for-jwt-signing-only
    admin-ttl: 7200000
    admin-token-name: token
    user-secret-key: test-user-secret-key-for-jwt-signing-only
    user-ttl: 7200000
    user-token-name: authentication
  wechat:
    appid: test-appid
    secret: test-secret
    mchid: test-mchid
    mch-serial-no: test-serial-no
    private-key-file-path: test-private-key.pem
    api-v3-key: test-api-v3-key
    notify-url: http://localhost/notify/paySuccess
    refund-notify-url: http://localhost/notify/refundSuccess
  storefront:
    mock-user-login: true

logging:
  level:
    com.sky.mapper: debug
