name: E2E Smoke Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: sky123456
          MYSQL_DATABASE: sky_take_out
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -psky123456"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          --health-start-period=30s

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=3s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build backend
        run: mvn -f core/backend/pom.xml package -DskipTests

      - name: Start backend with real OSS
        run: |
          java -jar core/backend/sky-server/target/sky-server.jar \
            --sky.datasource.host=localhost \
            --sky.datasource.port=3306 \
            --sky.datasource.database=sky_take_out \
            --sky.datasource.username=root \
            --sky.datasource.password=sky123456 \
            --sky.alioss.endpoint=${{ secrets.ALIYUN_ENDPOINT }} \
            --sky.alioss.access-key-id=${{ secrets.ALIYUN_ACCESS_KEY_ID }} \
            --sky.alioss.access-key-secret=${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} \
            --sky.alioss.bucket-name=${{ secrets.ALIYUN_BUCKET_NAME }} \
            --sky.alioss.startup-validation-enabled=true \
            --sky.jwt.admin-secret-key=sky-delivery-admin-secret-key-2026-very-long-string-for-hs256 \
            > backend.log 2>&1 &
          sleep 25
          curl -f http://localhost:8080/actuator/health

      - name: Start nginx
        run: |
          docker run -d --name sky-nginx -p 8081:80 \
            -v $PWD/core/nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro \
            -v $PWD/core/nginx/html:/usr/share/nginx/html:ro \
            nginx:alpine
          sleep 3
          curl -f -o /dev/null -w "%{http_code}" http://localhost:8081 | grep 200

      - name: Install Playwright dependencies
        working-directory: verification/e2e-tests
        run: |
          npm ci
          npx playwright install chromium
          npx playwright install-deps chromium

      - name: Run E2E tests
        working-directory: verification/e2e-tests
        env:
          CI: true
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: verification/e2e-tests/test-results/
          retention-days: 7
